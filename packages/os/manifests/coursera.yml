name: Coursera
id: coursera
icon: "https://www.google.com/s2/favicons?domain=coursera.org&sz=128"
url: https://www.coursera.org
category: other
ai_description: "Online courses from universities. Learn skills and earn certificates."

navigation:
  overview: >
    Coursera is an online learning platform offering courses, specializations, and degree programs
    from universities and companies. It opens to a browse page with recommended courses.

  pages:
    browse:
      description: "The home page showing recommended courses, popular topics, and featured programs."
      layout:
        - "Top: search bar, Explore dropdown, My Learning link, profile"
        - "Center: recommended courses, trending topics, featured specializations"
      search_bar:
        text: "Search input at the top"
        behavior: "Type a subject, skill, or course name. Press Enter to see results."
      explore_dropdown:
        text: "'Explore' in top navigation"
        behavior: "Opens a dropdown with subject categories (Data Science, Computer Science, Business, etc.). Click a category to browse courses in that field."

    search_results:
      description: "Results page showing matching courses and programs."
      layout:
        - "Left: filter sidebar (Subject, Level, Language, Duration, Partner)"
        - "Center: course cards with title, provider, rating, and enrollment info"
      course_card:
        text: "Individual course cards"
        behavior: "Shows course title, university/company name, star rating, number of reviews, and duration. Click to open the course detail page."
      filters:
        text: "Filter sidebar on the left"
        behavior: "Check boxes to filter by subject, difficulty level (Beginner, Intermediate, Advanced), language, and duration."

    course_detail:
      description: "Full detail page for a course."
      layout:
        - "Top: course title, provider, rating, enrollment count, 'Enroll for Free' button"
        - "Center: course description, syllabus, instructor info, skills gained"
        - "Below: reviews, related courses"
      enroll_button:
        text: "'Enroll for Free' or 'Enroll' button"
        behavior: "Starts the enrollment process. Some courses offer a free audit option (link below the main button) for accessing course materials without certification."

    my_learning:
      description: "Your enrolled courses and progress."
      layout:
        - "Center: cards for each enrolled course showing progress bar, next lesson, and completion percentage"

  workflows:
    search_courses:
      - "Click the search bar at the top"
      - "Type a subject or skill"
      - "Press Enter and use filters to narrow results"
      - "Click a course card to see its details"

    enroll_in_course:
      - "Open a course detail page"
      - "Click 'Enroll for Free' (or look for the 'Audit' link for free access)"
      - "The course appears in 'My Learning'"
      - "Start watching lectures and completing assignments"

  rules:
    - "NEVER try to search the web from inside this app. This app is for browsing and taking Coursera courses only."
    - "Use the search bar at the top to find courses by subject, skill, or course name."
    - "Use the filter sidebar (Subject, Level, Language, Duration) on search results to narrow course options."
    - "Click a course card to see its full detail page with description, syllabus, instructor info, and reviews."
    - "Check course ratings, review counts, and syllabus before recommending a course to the user."
    - "NEVER enroll in courses or start free trials without explicit user approval."
    - "NEVER make payments for certificates or subscriptions without explicit user approval."
    - "Use the Explore dropdown in the top navigation to browse courses by subject category."
    - "Check 'My Learning' for the user's enrolled courses and their progress."

  tips:
    - "Free audit mode gives access to video lectures but not graded assignments or certificates"
    - "Specializations are sequences of related courses — enrolling in a specialization covers all courses in it"
    - "Course ratings and review counts help identify high-quality courses"
    - "The syllabus section on the course page shows exactly what each week covers"
    - "Financial aid is available for paid courses through an application on the enrollment page"
