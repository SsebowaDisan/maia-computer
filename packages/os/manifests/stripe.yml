name: Stripe
id: stripe
icon: "https://www.google.com/s2/favicons?domain=stripe.com&sz=128"
url: https://dashboard.stripe.com
category: finance
ai_description: "Payment processing dashboard. Manage payments, subscriptions, and invoices."

navigation:
  overview: >
    Stripe is a payment processing platform. The dashboard shows revenue, payments, customers,
    and subscriptions with tools for managing the entire payment lifecycle.

  pages:
    dashboard:
      description: "The home page showing revenue metrics and recent activity."
      layout:
        - "Left sidebar: Payments, Balances, Customers, Products, Subscriptions, Invoices, Connect, Reports, Developers"
        - "Center: revenue chart, gross volume, recent payments, activity feed"
        - "Top-left: test/live mode toggle"
      sidebar:
        text: "Left navigation"
        behavior: "Click any section to navigate. Payments shows transaction list. Customers shows customer records. Developers has API logs and webhooks."
      mode_toggle:
        text: "Test/Live mode switch (top-left area)"
        behavior: "Switches between test mode (fake transactions for development) and live mode (real transactions). The dashboard color changes to indicate the active mode."
      search:
        text: "Search icon in the top bar (or press '/')"
        behavior: "Search by payment ID, customer email, amount, or description. Results grouped by Payments, Customers, Invoices."

    payments:
      description: "List of all payment transactions."
      layout:
        - "Center: table with status, amount, description, customer, and date columns"
        - "Top: filter and date range options"
      payment_row:
        text: "Individual payment entries"
        behavior: "Click to see full payment details: amount, customer, payment method, metadata, events timeline, and refund options."

    customer_detail:
      description: "Detail page for a single customer."
      layout:
        - "Top: customer name/email, balance"
        - "Center: payment history, subscriptions, invoices, payment methods"

  workflows:
    search_payments:
      - "Press '/' to open search"
      - "Type a payment ID, customer email, or amount"
      - "Click a result for full details"

    check_revenue:
      - "The dashboard home page shows gross volume and recent activity"
      - "Use date range selectors to view different periods"
      - "Click 'Payments' in the sidebar for the full transaction list"

    manage_customers:
      - "Click 'Customers' in the sidebar"
      - "Browse or search customer records"
      - "Click a customer to see their payment history, subscriptions, and payment methods"

  rules:
    - "NEVER try to search the web from inside this app. This app is for managing the Stripe payment dashboard only."
    - "NEVER make payments, issue refunds, or modify customer records without explicit user approval."
    - "Always verify the test/live mode toggle at the top-left before reading any data — test mode shows fake transactions."
    - "Press '/' to open global search and find payments by ID, customer email, or amount."
    - "Click 'Payments' in the left sidebar for the full transaction list with status, amount, and date columns."
    - "Click any payment row to see full details including payment method, metadata, and event timeline."
    - "Click 'Customers' in the sidebar to browse and search customer records with payment history."
    - "NEVER modify API keys, webhook settings, or developer configurations without explicit user approval."
    - "Use date range selectors on the dashboard to view revenue metrics for different periods."

  tips:
    - "Always verify test vs live mode — the mode toggle is at the top-left"
    - "The '/' shortcut opens global search from any page"
    - "Payment detail pages show a timeline of events (created, confirmed, succeeded, etc.)"
    - "The Developers section has API logs for debugging integration issues"
    - "Webhooks (Developers > Webhooks) show event deliveries and failures"
