name: Stripe
id: stripe
icon: "https://www.google.com/s2/favicons?domain=stripe.com&sz=128"
url: https://dashboard.stripe.com
category: finance
ai_description: "Payment processing platform. View payments, customers, subscriptions, and revenue."
help_url: "https://docs.stripe.com"

navigation:
  overview: >
    Stripe Dashboard is the control center for payment processing. It shows real-time payment data,
    customer information, and financial reports. The dashboard has a test mode (orange header bar)
    and live mode toggle. API keys are in Developers section.
  pages:
    dashboard:
      description: "Home showing payment volume chart, recent payments, and key metrics."
      layout:
        - "Top: Stripe logo, search bar, test/live mode toggle, notifications, settings"
        - "Left sidebar: Home, Payments, Balances, Customers, Products, Subscriptions, Invoices, Payment links, Connect, Billing, Revenue recognition, Tax, Sigma, Radar, Developers, Settings"
        - "Center: charts (gross volume, net revenue, new customers) and recent activity"
    payments:
      description: "List of all payment intents with status (Succeeded, Failed, Incomplete, Refunded)."
      behavior: "Click a payment to see full details: amount, customer, payment method, timeline, metadata, logs."
    customers:
      description: "List of all customers with email, name, spend, and creation date."
      behavior: "Click a customer to see their profile: payment methods, subscriptions, invoices, payment history."
    developers:
      description: "API keys, webhooks, logs, events."
      api_keys: "Publishable key (pk_test_...) and Secret key (sk_test_...) for test mode. Click 'Reveal' to show secret key."
  workflows:
    search_payment:
      - "Click the search bar at the top or press /"
      - "Type: payment amount, customer email, payment ID (pi_...), or description"
      - "Click a result to view full payment details"
    check_test_vs_live:
      - "Look at the top bar — orange bar means TEST mode, no bar means LIVE mode"
      - "Click 'Test mode' / 'Live mode' toggle in the top right to switch"
  tips:
    - "Test mode uses test API keys (pk_test_, sk_test_) — no real charges are made"
    - "The Developers > Events section shows all webhook events in real time"
    - "Use Radar for fraud detection rules and risk settings"
    - "Sigma allows SQL queries against your Stripe data"
