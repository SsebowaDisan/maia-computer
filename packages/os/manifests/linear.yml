name: Linear
id: linear
icon: "https://www.google.com/s2/favicons?domain=linear.app&sz=128"
url: https://linear.app
category: developer
ai_description: "Issue tracking and project management for software teams."
help_url: "https://linear.app/docs"

navigation:
  overview: >
    Linear is a keyboard-first issue tracker for software teams. It's designed for speed —
    most actions have single-key shortcuts. Issues flow through states (Backlog → Todo →
    In Progress → Done → Canceled). Issues belong to teams and can be grouped into projects,
    cycles (sprints), and roadmaps.
  pages:
    sidebar:
      layout:
        - "Top: workspace name, search (Cmd+K), create issue (C), notifications bell"
        - "Sections: My Issues, Inbox, Views, your Team(s) — each team has Issues, Projects, Cycles, Roadmaps"
    issue_list:
      description: "Main view showing issues in a filterable, sortable list."
      grouping: "Issues can be grouped by Status, Priority, Assignee, Label, Project, or Cycle"
      filters: "Click 'Filter' to add filter rules. Combine multiple filters."
    issue_detail:
      description: "Full issue view with title, description (Markdown), status, priority, assignee, labels, project, cycle."
      properties: "Right sidebar shows: Status, Priority (Urgent/High/Medium/Low/No priority), Assignee, Labels, Project, Cycle, Estimate, Due date"
  workflows:
    create_issue:
      - "Press C anywhere (or Cmd+K then type 'Create issue')"
      - "Type title, press Tab to move to description"
      - "Set status, priority, assignee, labels using the dropdowns"
      - "Press Cmd+Enter to save"
    search:
      - "Press Cmd+K to open command palette"
      - "Type to search issues, projects, or commands"
  keyboard_shortcuts:
    - "C — create issue"
    - "Cmd+K — command palette / search"
    - "J/K — move up/down in list"
    - "X — select issue"
    - "S — set status"
    - "P — set priority"
    - "A — set assignee"
    - "L — set labels"
    - "D — set due date"
    - "Cmd+Shift+P — set project"
  tips:
    - "Linear is fastest with keyboard — learn C, Cmd+K, S, P, A shortcuts"
    - "Views let you save custom filtered lists for quick access"
    - "Cycles are time-boxed sprints — drag issues into the active cycle"
