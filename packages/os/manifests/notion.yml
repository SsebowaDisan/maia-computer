name: Notion
id: notion
icon: "https://www.google.com/s2/favicons?domain=notion.so&sz=128"
url: https://www.notion.so
category: productivity
ai_description: "All-in-one workspace. Notes, docs, wikis, databases, project management."
help_url: "https://www.notion.so/help"

navigation:
  overview: >
    Notion is a block-based workspace used by 100M+ users. Everything is a page containing blocks
    (text, headings, lists, toggles, tables, databases, embeds). Pages nest inside pages creating
    a tree. Databases are collections of pages with properties (like spreadsheet columns). The slash
    command menu (/) is the primary way to insert any block type.

  pages:
    sidebar:
      description: "Left sidebar showing workspace hierarchy — teamspaces, pages, favorites, private, shared."
      layout:
        - "Top: workspace name/switcher, search (Cmd+K), new page button, settings"
        - "Middle: Favorites, Teamspaces, Shared, Private sections — each expandable"
        - "Bottom: Templates, Import, Trash"
      search:
        shortcut: "Cmd+K (or Cmd+P)"
        behavior: "Opens command palette. Type to search all pages, databases, and content. Also shows recent pages. Can search by page title or text content."
      new_page:
        behavior: "Creates a new page. Can also use Cmd+N. The page appears in your Private section by default."
    page:
      description: "A page with a title, optional icon/cover, and content blocks below."
      layout:
        - "Top: breadcrumb navigation, share button, favorites star, three-dot menu (...)"
        - "Title area: large editable title, optional icon (click to set emoji), optional cover image"
        - "Body: blocks stacked vertically — each block is independently editable"
      slash_commands:
        description: "Type / anywhere to open the block insertion menu"
        common_commands:
          - "/page — insert a sub-page"
          - "/h1, /h2, /h3 — headings"
          - "/todo — checkbox item"
          - "/bullet, /numbered — lists"
          - "/toggle — collapsible toggle block"
          - "/table — simple table"
          - "/database — full database (table, board, list, gallery, calendar, timeline views)"
          - "/callout — highlighted callout box"
          - "/code — code block with syntax highlighting"
          - "/divider — horizontal line"
          - "/image, /embed, /bookmark — media blocks"
          - "/mention — mention a person or page"
          - "/date — insert a date or date range"
      block_actions:
        behavior: "Click the ⋮⋮ drag handle (left of any block) or hover and click ••• for block menu: Delete, Duplicate, Turn into (convert block type), Color, Comment, Move to. Drag the ⋮⋮ handle to reorder blocks."
    database:
      description: "A collection of pages with structured properties. Can be viewed as table, board, list, gallery, calendar, or timeline."
      views: "Click '+ Add a view' tab to create new views. Each view can have its own filters, sorts, and visible properties."
      properties: "Click '+' in table header to add properties: Text, Number, Select, Multi-select, Date, Person, Files, Checkbox, URL, Email, Phone, Formula, Relation, Rollup, Created time, Last edited."
      filters: "Click 'Filter' button above the database to add filter rules by property values."
      sorts: "Click 'Sort' button to order entries by any property."

  workflows:
    create_page:
      - "Click '+' in sidebar or press Cmd+N"
      - "Type the page title"
      - "Press Enter to start adding content"
      - "Type / to insert any block type"
    create_database:
      - "Type /database on a page and select 'Database - Full page' or 'Database - Inline'"
      - "Name the database"
      - "Click '+' in header to add properties (columns)"
      - "Click 'New' to add entries (each entry is a page)"
      - "Switch views using tabs above the database"
    search_everything:
      - "Press Cmd+K"
      - "Type your search query"
      - "Results show pages, databases, and text matches"
      - "Click a result to navigate to it"

  keyboard_shortcuts:
    - "Cmd+K — search and command palette"
    - "Cmd+N — new page"
    - "Cmd+Shift+N — new window"
    - "Cmd+[ — go back"
    - "Cmd+] — go forward"
    - "Cmd+U — go up to parent page"
    - "/ — slash command menu"
    - "Cmd+B, Cmd+I, Cmd+U — bold, italic, underline"
    - "Cmd+Shift+H — toggle highlight"
    - "Cmd+E — inline code"
    - "Tab — indent block"
    - "Shift+Tab — outdent block"
    - "Cmd+Enter — toggle todo checkbox"
    - "--- — horizontal divider"
    - "Cmd+D — duplicate block"
    - "Backspace on empty block — delete block"

  tips:
    - "Type @ to mention a person or page — creates a live link"
    - "Type [[ to link to another page inline"
    - "Drag blocks between columns by holding and dropping side by side"
    - "Turn any page into a database by adding properties via the ••• menu"
    - "Use templates inside databases for consistent page structures"
    - "The 'Linked view of database' block lets you embed filtered views of one database on multiple pages"
