name: Behance
id: behance
icon: "https://www.google.com/s2/favicons?domain=behance.net&sz=128"
url: https://www.behance.net
category: productivity
ai_description: "Creative portfolio platform. Browse and showcase design projects."

navigation:
  overview: >
    Behance is Adobe's creative portfolio platform. It showcases design projects from graphic
    design, photography, UI/UX, illustration, and more.

  pages:
    discover:
      description: "The home feed showing curated and trending creative projects."
      layout:
        - "Top: navigation with Discover, Live, Hiring, Assets links and search icon"
        - "Center: grid of project cards with cover images, titles, creator names, and like counts"
        - "Top filter: category and field filters"
      project_card:
        text: "Individual project cards in the grid"
        behavior: "Shows cover image, project title, creator name, and appreciation (like) count. Click to open the full project page."
      search:
        text: "Search icon in the top navigation"
        behavior: "Click to open the search bar. Type keywords, styles, or creator names. Results show projects, people, and assets."
      category_nav:
        text: "Category links (Graphic Design, Photography, UI/UX, etc.)"
        behavior: "Click to filter the feed by creative discipline."

    project:
      description: "A full project page showing all assets and details."
      layout:
        - "Top: project title, creator info"
        - "Center: vertically scrolling gallery of project images, videos, and text"
        - "Bottom: tools used, tags, related projects, comments"
      project_images:
        text: "Images and media in the project"
        behavior: "Scroll down to see all assets. Projects can be very long with many images."
      appreciate_button:
        text: "Thumbs up / heart icon"
        behavior: "Click to 'appreciate' (like) the project."

    profile:
      description: "A creator's profile page."
      layout:
        - "Top: profile photo, name, bio, follower count, location"
        - "Below: grid of their projects"
      follow_button:
        text: "'Follow' button"
        behavior: "Follow the creator to see their new projects in your feed."

  workflows:
    browse_projects:
      - "Scroll the Discover feed to see trending and curated projects"
      - "Click category filters to focus on a specific creative field"
      - "Click any project card to view the full project"

    search_creative_work:
      - "Click the search icon in the top navigation"
      - "Type a keyword, style, or creator name"
      - "Browse results and click projects to view them"

  rules:
    - "NEVER try to search the web from inside this app. This app is for browsing creative portfolios and design projects only."
    - "Click the search icon in the top navigation to open the search bar. Type keywords, styles, or creator names to find projects."
    - "Use the category links (Graphic Design, Photography, UI/UX, etc.) to filter the Discover feed by creative discipline."
    - "Click project cards in the grid to open the full project page. Scroll down fully — projects can be very long with many images."
    - "Check the 'Tools used' and tags at the bottom of project pages to discover similar work and related techniques."
    - "Click creator names to visit their profile and see their full portfolio of projects."
    - "Use the Discover feed for curated and trending work. Scroll the feed to browse beyond the initial results."

  tips:
    - "Projects can be very long — scroll fully to see all the creator's assets"
    - "The Discover feed is algorithmically curated, showing trending and featured work"
    - "Creative Fields filters help narrow browsing to specific disciplines"
    - "Tools used and tags at the bottom of projects help discover similar work"
