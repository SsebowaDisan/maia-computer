name: Jira
id: jira
icon: "https://www.google.com/s2/favicons?domain=atlassian.com&sz=128"
url: https://www.atlassian.com/software/jira
category: developer
ai_description: "Project management and issue tracking for agile teams."
help_url: "https://support.atlassian.com/jira-software-cloud"

navigation:
  overview: >
    Jira is Atlassian's project management tool used by 75,000+ companies. It supports Scrum and
    Kanban workflows. Issues have types (Epic, Story, Task, Bug, Sub-task), statuses (To Do, In Progress,
    Done), priorities, and custom fields. JQL (Jira Query Language) enables powerful searching.
  pages:
    board:
      description: "Kanban or Scrum board showing issues as cards in columns (To Do, In Progress, Done)."
      behavior: "Drag cards between columns to change status. Click a card to open issue detail. Filter bar at top."
    backlog:
      description: "List of all issues not yet in a sprint (Scrum) or unstarted (Kanban)."
      behavior: "Drag issues into a sprint. Right-click for quick actions. Create issues inline with '+ Create issue' at bottom."
    issue_detail:
      description: "Full issue view with summary, description, status, assignee, priority, labels, sprint, story points, linked issues, comments, activity log."
    project_sidebar:
      layout:
        - "Top: project name, star"
        - "Sections: Board, Backlog, Timeline, Code, Project pages, Add item"
        - "Bottom: Project settings"
  workflows:
    create_issue:
      - "Click blue 'Create' button (top nav) or press C"
      - "Select project and issue type (Story, Task, Bug, Epic)"
      - "Fill Summary (required), Description (optional, supports Markdown)"
      - "Set Assignee, Priority, Labels, Sprint, Story Points"
      - "Click 'Create'"
    search_with_jql:
      - "Click search bar or press /"
      - "Type JQL: project = PROJ AND status = 'In Progress' AND assignee = currentUser()"
      - "Common operators: =, !=, IN, NOT IN, ~(contains), ORDER BY"
      - "Common fields: project, status, assignee, reporter, priority, created, updated, labels, sprint"
  tips:
    - "JQL is the most powerful way to find issues: assignee = currentUser() AND sprint in openSprints()"
    - "Use keyboard shortcut / to focus search from anywhere"
    - "Epics group related stories — use the Roadmap view to see epic timelines"
    - "Board columns map to workflow statuses — customize in Project Settings > Board"
