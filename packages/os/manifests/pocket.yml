name: Pocket
id: pocket
icon: "https://www.google.com/s2/favicons?domain=getpocket.com&sz=128"
url: https://getpocket.com
category: media
ai_description: "Save articles and videos to read later. Organize and discover content."

navigation:
  overview: >
    Pocket is a read-it-later service. Save articles and videos from the web to read offline
    or later, organized with tags and a recommendation engine.

  pages:
    my_list:
      description: "The main view showing all saved articles."
      layout:
        - "Left sidebar: My List, Archive, Favorites, Highlights, Tags, Discover"
        - "Center: saved items as cards with title, source, and thumbnail"
        - "Top: search bar, '+' save button"
      article_card:
        text: "Individual saved article cards"
        behavior: "Shows title, source domain, and optional thumbnail. Click to open in Pocket's reader view. Hover for quick actions: archive, favorite, tag, delete."
      save_button:
        text: "'+' button in the navigation"
        behavior: "Opens a URL input. Paste a link and press Enter to save it to your list."
      search_bar:
        text: "Search input at top"
        behavior: "Search saved articles by title, URL, or tag."
      sidebar:
        text: "Left navigation"
        behavior: "My List shows unread items. Archive shows previously archived items. Favorites shows starred items. Tags shows items by tag. Discover shows recommended articles."

    reader:
      description: "The clean reading view for a saved article."
      layout:
        - "Center: article content in a clean, distraction-free layout"
        - "Top: back button, archive, favorite, tag, share buttons"

  workflows:
    save_article:
      - "Click the '+' button"
      - "Paste a URL"
      - "Press Enter — the article is saved to your list"

    read_later:
      - "Open My List to see saved articles"
      - "Click an article to read it in Pocket's clean reader"
      - "Archive it when done (removes from My List but keeps it saved)"

    organize:
      - "Add tags to articles by hovering and clicking the tag icon"
      - "Favorite important articles with the star icon"
      - "Use Tags in the sidebar to browse by category"

  rules:
    - "NEVER try to search the web from inside this app. This app is for managing saved articles in Pocket only."
    - "Use the search bar at the top to find saved articles by title, URL, or tag."
    - "Click items in My List to open them in Pocket's clean reader view."
    - "Use the sidebar navigation: My List for unread, Archive for completed, Favorites for starred items."
    - "Add tags to articles by hovering and clicking the tag icon for better organization."
    - "NEVER delete or archive articles without explicit user approval."
    - "NEVER save new articles or modify tags without explicit user approval."
    - "Check the Discover section in the sidebar for recommended articles based on reading history."

  tips:
    - "Archived items are hidden from My List but not deleted — find them in Archive"
    - "Tags help organize articles by topic for easy retrieval"
    - "The Discover section recommends articles based on your reading history"
    - "Pocket's reader view strips ads and formatting for clean reading"
