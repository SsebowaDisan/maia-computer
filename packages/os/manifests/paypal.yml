name: PayPal
id: paypal
icon: "https://www.google.com/s2/favicons?domain=paypal.com&sz=128"
url: https://www.paypal.com
category: finance
ai_description: "Send and receive payments. Manage transactions and invoices."

navigation:
  overview: >
    PayPal is an online payment platform for sending, receiving, and managing money.
    It opens to a dashboard showing your balance and recent transactions.

  pages:
    dashboard:
      description: "The home page showing balance and recent activity."
      layout:
        - "Top: navigation (Dashboard, Activity, Send & Request, Wallet)"
        - "Center: balance card, Send/Request buttons, recent transactions"
      balance_card:
        text: "Balance display on the dashboard"
        behavior: "Shows available and pending balances. Click to expand for multi-currency balances."
      send_request_buttons:
        text: "Send and Request buttons"
        behavior: "Send opens a form to send money to an email/phone. Request opens a form to request payment from someone."
      recent_transactions:
        text: "Recent transactions list"
        behavior: "Shows the latest transactions with type, name, amount, and date. Click 'Activity' in the nav for the full history."

    activity:
      description: "Full transaction history."
      layout:
        - "Top: search bar, date range filter, status filter"
        - "Center: transaction list with type, name, amount, status, and date"
      search_bar:
        text: "Search input at top of Activity page"
        behavior: "Search by name, email, or transaction ID."
      transaction_row:
        text: "Individual transactions"
        behavior: "Click to see full details: amount, fees, sender/recipient, date, and transaction ID."

    wallet:
      description: "Your payment methods and balance details."
      layout:
        - "Center: linked bank accounts, cards, and balance breakdown"

  workflows:
    check_transactions:
      - "Click 'Activity' in the top navigation"
      - "Browse recent transactions or use the search bar"
      - "Adjust the date range filter for older transactions"
      - "Click any transaction for full details"

    send_money:
      - "Click 'Send' on the dashboard (or Send & Request in the nav)"
      - "Enter the recipient's email or phone number"
      - "Enter the amount"
      - "Review and confirm the payment"

  rules:
    - "NEVER try to search the web from inside this app. This app is for managing PayPal payments and transactions only."
    - "NEVER make payments or transfers without explicit user approval."
    - "NEVER send money, request payments, or modify payment methods without explicit user approval."
    - "Check the balance card on the dashboard for available and pending balances."
    - "Click 'Activity' in the top navigation to browse the full transaction history."
    - "Use the search bar on the Activity page to find transactions by name, email, or transaction ID."
    - "Apply date range and status filters to narrow transaction results."
    - "Click any transaction row for full details including amount, fees, and transaction ID."
    - "The Wallet section shows all linked bank accounts and cards — view only unless user requests changes."

  tips:
    - "The Activity page loads with a default date range — expand it to find older transactions"
    - "Pending transactions appear separately from completed ones"
    - "Transaction IDs are useful for resolving disputes — find them in the transaction details"
    - "The Wallet section shows all linked bank accounts and cards"
